apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f docker-compose.yml convert
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: grafana
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f docker-compose.yml convert
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: grafana
    spec:
      containers:
        - image: grafana/grafana-enterprise:12.3-ubuntu
          name: grafana
          env:
            - name: GF_PATHS_PROVISIONING
              value: /grafana-provisioning
          resources:
            requests:
              cpu: 4
              memory: 8Gi
            limits:
              cpu: 4
              memory: 8Gi
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /grafana-provisioning/datasources
              readOnly: true
          securityContext:
            runAsUser: {{ .Values.nfs.security.userId }}
            runAsGroup: {{ .Values.nfs.security.groupId }}
      restartPolicy: Always
      volumes:
        - name: grafana-config
          nfs:
            server: {{ .Values.nfs.vols.grafanaConfig.server }}
            path: {{ .Values.nfs.vols.grafanaConfig.path }}
        - name: grafana-data
          nfs:
            server: {{ .Values.nfs.vols.grafanaData.server }}
            path: {{ .Values.nfs.vols.grafanaData.path }}
        - name: grafana-datasources
          secret:
            secretName: grafana-datasources
